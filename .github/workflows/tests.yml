name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install "jax==0.4.31" "jaxlib==0.4.31" "numpyro==0.19.0"
          pip install -e .
          pip install pytest pytest-cov

      - name: Download DSPS SSP template (tempdata.h5)
        run: |
          curl --fail --location --retry 5 --retry-delay 2 \
            https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/ssp_data_fsps_v3.2_lgmet_age.h5 \
            --output tempdata.h5
          test -s tempdata.h5

      - name: Run unit tests with coverage
        run: |
          pytest -q tests -m "not integration" \
            --cov=src/jaxqsofit \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  integration:
    # Manual only (network/astroquery dependent)
    if: github.event_name == 'workflow_dispatch'
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package and integration deps
        run: |
          python -m pip install --upgrade pip
          pip install "jax==0.4.31" "jaxlib==0.4.31" "numpyro==0.19.0"
          pip install -e .
          pip install pytest astroquery

      - name: Download DSPS SSP template (tempdata.h5)
        run: |
          curl --fail --location --retry 5 --retry-delay 2 \
            https://portal.nersc.gov/project/hacc/aphearin/DSPS_data/ssp_data_fsps_v3.2_lgmet_age.h5 \
            --output tempdata.h5
          test -s tempdata.h5

      - name: Run integration tests
        run: |
          pytest -q tests -m integration
